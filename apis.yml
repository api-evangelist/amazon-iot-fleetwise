aid: amazon-iot-fleetwise
name: Amazon IoT FleetWise
description: >-
  AWS IoT FleetWise is a fully managed service that makes it easier to collect,
  transform, and transfer vehicle data to the cloud in near-real time. It
  provides tools for modeling vehicle signals and configuring intelligent data
  collection from vehicle fleets at scale.
