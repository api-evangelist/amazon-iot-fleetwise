naftiko: 1.0.0-alpha2
info:
  label: Amazon IoT FleetWise - Vehicle Fleet Management
  description: Unified capability for Automotive Engineer, IoT Developer to manage collect, transform, and transfer vehicle
    data to the cloud operations.
  tags:
  - IoT
  - AWS
  - Automotive
  - Vehicle Telematics
  - Connected Vehicles
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
capability:
  consumes:
  - type: http
    namespace: iot-fleetwise
    baseUri: https://iotfleetwise.amazonaws.com
    description: Amazon IoT FleetWise REST API
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_ACCESS_KEY_ID}}'
      placement: header
    resources:
    - name: resources
      path: /
      description: Amazon IoT FleetWise resources
      operations:
      - name: list-vehicles
        method: GET
        description: List Vehicles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: vehicle-fleet-management-api
    description: Unified REST API for vehicle fleet management.
    resources:
    - path: /v1/resources
      name: resources
      description: Amazon IoT FleetWise resources
      operations:
      - method: GET
        name: list-vehicles
        description: List Vehicles
        call: iot-fleetwise.list-vehicles
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: vehicle-fleet-management-mcp
    transport: http
    description: MCP server for AI-assisted vehicle fleet management.
    tools:
    - name: list-vehicles
      description: Amazon IoT FleetWise List Vehicles
      hints:
        readOnly: true
        openWorld: true
      call: iot-fleetwise.list-vehicles
      outputParameters:
      - type: object
        mapping: $.
    - name: create-vehicle
      description: Amazon IoT FleetWise Create Vehicle
      hints:
        readOnly: false
      call: iot-fleetwise.create-vehicle
      outputParameters:
      - type: object
        mapping: $.
    - name: list-fleets
      description: Amazon IoT FleetWise List Fleets
      hints:
        readOnly: true
        openWorld: true
      call: iot-fleetwise.list-fleets
      outputParameters:
      - type: object
        mapping: $.
    - name: create-fleet
      description: Amazon IoT FleetWise Create Fleet
      hints:
        readOnly: false
      call: iot-fleetwise.create-fleet
      outputParameters:
      - type: object
        mapping: $.
    - name: list-signal-catalogs
      description: Amazon IoT FleetWise List Signal Catalogs
      hints:
        readOnly: true
        openWorld: true
      call: iot-fleetwise.list-signal-catalogs
      outputParameters:
      - type: object
        mapping: $.
    - name: create-signal-catalog
      description: Amazon IoT FleetWise Create Signal Catalog
      hints:
        readOnly: false
      call: iot-fleetwise.create-signal-catalog
      outputParameters:
      - type: object
        mapping: $.
    - name: list-campaigns
      description: Amazon IoT FleetWise List Campaigns
      hints:
        readOnly: true
        openWorld: true
      call: iot-fleetwise.list-campaigns
      outputParameters:
      - type: object
        mapping: $.
    - name: create-campaign
      description: Amazon IoT FleetWise Create Campaign
      hints:
        readOnly: false
      call: iot-fleetwise.create-campaign
      outputParameters:
      - type: object
        mapping: $.
