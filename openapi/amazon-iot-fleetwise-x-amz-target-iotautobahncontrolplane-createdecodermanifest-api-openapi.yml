              schema:
                $ref: '#/components/schemas/LimitExceededException'
        '484':
          description: DecoderManifestValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecoderManifestValidationException'
        '485':
          description: ThrottlingException
          content:
