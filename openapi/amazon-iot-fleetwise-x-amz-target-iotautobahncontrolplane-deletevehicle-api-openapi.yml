      type: string
      pattern: '[a-zA-Z\d\-_:]+'
      minLength: 1
      maxLength: 100
    ValidationException: {}
    DeleteVehicleRequest:
      type: object
      required:
      - vehicleName
      title: DeleteVehicleRequest
      properties:
        vehicleName:
          allOf:
          - $ref: '#/components/schemas/vehicleName'
          - description: 'The ID of the vehicle to delete. '
    InternalServerException: {}
    ThrottlingException: {}
    DeleteVehicleResponse:
      type: object
      required:
      - vehicleName
      - arn
      properties:
        vehicleName:
