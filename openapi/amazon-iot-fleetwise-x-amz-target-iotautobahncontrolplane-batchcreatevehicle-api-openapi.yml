      summary: Amazon IoT FleetWise Batch Create Vehicle
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - '#X Amz Target=IoTAutobahnControlPlane.BatchCreateVehicle'
components:
  schemas:
    attributeValue:
      type: string
    createVehicleRequestItems:
